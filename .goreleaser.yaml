version: 2

before:
  hooks:
    - go clean -cache

project_name: goecs

builds:
  - id: universal
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.arch={{.Arch}} -checklinkname=0
    goos:
      - linux
      - windows
      - freebsd
    goarch:
      - arm
      - arm64
      - 386
      - amd64
      - mips
      - mipsle
      - mips64
      - mips64le
      - ppc64
      - ppc64le
      - s390x
      - riscv64
    gomips:
      - softfloat
    ignore:
      - goos: windows
        goarch: arm
    main: ./
    binary: goecs
    hooks:
      pre:
        # Populate geekbench_bins in the cputest module cache with the
        # platform-specific Geekbench binary so it gets embedded via
        # //go:embed all:geekbench_bins in cputest's geekbench_embed.go.
        # Targets linux/amd64, linux/arm64, linux/arm get real binaries;
        # all other targets get an empty dir → runtime PATH fallback.
        - cmd: bash scripts/embed_geekbench.sh
          env:
            - GOOS={{ .Os }}
            - GOARCH={{ .Arch }}

  - id: darwin-amd64
    env:
      - CGO_ENABLED=1
      - CC=o64-clang
      - CXX=o64-clang++
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.arch={{.Arch}} -checklinkname=0
    goos:
      - darwin
    goarch:
      - amd64
    main: ./
    binary: goecs

  - id: darwin-arm64
    env:
      - CGO_ENABLED=1
      - CC=oa64-clang
      - CXX=oa64-clang++
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.arch={{.Arch}} -checklinkname=0
    goos:
      - darwin
    goarch:
      - arm64
    main: ./
    binary: goecs

universal_binaries:
  - name_template: "goecs"
    replace: false

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "goecs"

archives:
  - name_template: "goecs_{{ .Os }}_{{ .Arch }}"
    format: zip
    files:
      - none*

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore"
      - Merge pull request
      - Merge branch
      - go mod tidy
      - New translations

upx:
  - enabled: true
    brute: true
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - 386
      - arm64
      - ppc64le
      - s390x
      - riscv64
