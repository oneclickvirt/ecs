name: Sync Source and Build CNB Docker Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CNB_REPOSITORY: https://cnb.cool/oneclickvirt/ecs.git
  CNB_IMAGE: docker.cnb.cool/oneclickvirt/ecs:latest

concurrency:
  group: cnb-master-and-docker
  cancel-in-progress: true

jobs:
  sync-source:
    if: github.repository == 'oneclickvirt/ecs'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push source to CNB master
        env:
          CNB_USERNAME: ${{ secrets.CNB_PUSH_USERNAME }}
          CNB_TOKEN: ${{ secrets.CNB_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          trap 'rm -f "$HOME/.netrc"' EXIT
          printf 'machine cnb.cool\nlogin %s\npassword %s\n' \
            "$CNB_USERNAME" "$CNB_TOKEN" > "$HOME/.netrc"
          chmod 600 "$HOME/.netrc"
          git remote add cnb "$CNB_REPOSITORY"
          git push --force cnb HEAD:refs/heads/master

  build-and-push-image:
    if: github.repository == 'oneclickvirt/ecs'
    needs: sync-source
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to CNB Registry
        uses: docker/login-action@v3
        with:
          registry: docker.cnb.cool
          username: ${{ secrets.CNB_PUSH_USERNAME }}
          password: ${{ secrets.CNB_PUSH_TOKEN }}

      - name: Build and push CNB Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64,linux/386,linux/riscv64
          push: true
          tags: ${{ env.CNB_IMAGE }}
          cache-from: type=gha,scope=cnb-ecs
          cache-to: type=gha,mode=max,scope=cnb-ecs
