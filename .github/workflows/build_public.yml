name: Public Build
on:
  workflow_run:
    workflows: ["Build and Release"]
    types:
      - completed
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        check-latest: true
        
    - name: Create public branch
      run: |
        # 删除本地 public 分支（如果存在）
        git branch -D public 2>/dev/null || true
        # 基于当前分支创建新的 public 分支（完全覆盖）
        git checkout -b public
        
    - name: Remove security package references
      env:
        GOFLAGS: -tags=ecs_public
      run: |
        set -euo pipefail
        python3 .back/create_public_branch.py
        go clean -cache -testcache -fuzzcache
        if grep -R -n -E 'github\.com/oneclickvirt/(security|privatespeedtest)' \
          go.mod internal api utils goecs.go --include='*.go'; then
          echo "Public branch still contains private module references" >&2
          exit 1
        fi
    - name: Build and Test
      env:
        GOFLAGS: -tags=ecs_public
      run: |
        set -euo pipefail
        go test ./...
        go build -ldflags="-checklinkname=0" -o maintest
        ./maintest -menu=false -l en -security=false -upload=false || exit 1
        rm -rf maintest
        
    - name: Commit and push changes
      run: |
        set -euo pipefail
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -A
        if git diff --cached --quiet; then
          echo "Public branch generator produced no changes" >&2
          exit 1
        fi
        git commit -m "Auto update public version (no private packages)"
        git push -f origin public
